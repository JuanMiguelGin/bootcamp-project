<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- CABECERA -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">TaskFlow</span>
      </div>
      <button class="dark-toggle" id="darkToggle" aria-label="Cambiar modo oscuro">
        <span id="darkIcon">☽</span>
      </button>
    </div>
  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main">

    <!-- FORMULARIO PARA AÑADIR TAREAS -->
    <section class="form-section" aria-labelledby="form-title">
      <h2 id="form-title" class="form-title">Nueva tarea</h2>
      <form class="task-form" id="taskForm" novalidate>
        <label for="taskInput" class="sr-only">Escribe una tarea</label>
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="¿Qué tienes que hacer?"
          autocomplete="off"
          maxlength="120"
        />
        <button type="submit" class="btn-add" aria-label="Añadir tarea">
          Añadir
        </button>
      </form>
    </section>

    <!-- FILTROS Y BÚSQUEDA -->
    <section class="controls" aria-label="Filtros y búsqueda">
      <div class="filters" role="group" aria-label="Filtrar tareas">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="pending">Pendientes</button>
        <button class="filter-btn" data-filter="completed">Completadas</button>
      </div>
      <label for="searchInput" class="sr-only">Buscar tareas</label>
      <input
        type="search"
        id="searchInput"
        class="search-input"
        placeholder="Buscar..."
        aria-label="Buscar tareas"
      />
    </section>

    <!-- ACCIONES GLOBALES -->
    <section class="bulk-actions" aria-label="Acciones globales">
      <button class="btn-ghost" id="markAllBtn">Marcar todas</button>
      <button class="btn-ghost btn-danger" id="clearCompletedBtn">Borrar completadas</button>
    </section>

    <!-- LISTA DE TAREAS -->
    <section aria-labelledby="tasks-title">
      <h2 id="tasks-title" class="sr-only">Lista de tareas</h2>
      <ul class="task-list" id="taskList" aria-live="polite" aria-label="Lista de tareas">
        <!-- Las tareas se renderizan aquí con JS -->
      </ul>
      <p class="empty-msg" id="emptyMsg">No hay tareas. ¡Añade una arriba! 🎯</p>
    </section>

  </main>

  <!-- PANEL DE ESTADÍSTICAS -->
  <aside class="sidebar" aria-labelledby="stats-title">
    <h2 id="stats-title" class="stats-title">Estadísticas</h2>
    <div class="stat-card">
      <span class="stat-number" id="statTotal">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat-card">
      <span class="stat-number stat-pending" id="statPending">0</span>
      <span class="stat-label">Pendientes</span>
    </div>
    <div class="stat-card">
      <span class="stat-number stat-done" id="statCompleted">0</span>
      <span class="stat-label">Completadas</span>
    </div>
    <div class="progress-wrap" aria-label="Progreso">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="progress-label" id="progressLabel">0%</span>
    </div>
  </aside>

  <!-- PIE DE PÁGINA -->
  <footer class="footer">
    <p>TaskFlow — Bootcamp Project</p>
  </footer>

  <!-- PLANTILLA DE TAREA (no visible, usada por JS) -->
  <template id="taskTemplate">
    <li class="task-card">
      <button class="task-check" aria-label="Marcar como completada"></button>
      <span class="task-title"></span>
      <button class="task-edit" aria-label="Editar tarea">✎</button>
      <button class="task-delete" aria-label="Eliminar tarea">✕</button>
    </li>
  </template>

  <script src="app.js"></script>
</body>
</html>
