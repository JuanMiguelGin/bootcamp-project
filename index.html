<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
 
  <!-- ✅ FASE 9: Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Georgia', 'Times New Roman', 'serif'],
          },
          colors: {
            accent: { DEFAULT: '#2d6a4f', dark: '#52b788' }
          },
          keyframes: {
            slideIn: {
              from: { opacity: '0', transform: 'translateY(6px)' },
              to:   { opacity: '1', transform: 'translateY(0)' }
            },
            shake: {
              '0%,100%': { transform: 'translateX(0)' },
              '25%':     { transform: 'translateX(-6px)' },
              '75%':     { transform: 'translateX(6px)' }
            }
          },
          animation: {
            slideIn: 'slideIn 0.2s ease',
            shake:   'shake 0.35s ease'
          }
        }
      }
    }
  </script>
 
  <!-- Solo los estilos que Tailwind no puede expresar con clases estáticas -->
  <link rel="stylesheet" href="style.css" />
</head>
 
<body class="bg-stone-100 dark:bg-neutral-900 text-neutral-900 dark:text-stone-100
             min-h-screen grid grid-cols-1 lg:grid-cols-[1fr_260px]
             grid-rows-[auto_1fr_auto] transition-colors duration-200">
 
  <!-- CABECERA -->
  <header class="lg:col-span-2 bg-white dark:bg-neutral-800
                 border-b border-stone-200 dark:border-neutral-700 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-xl" style="color:#2d6a4f">✦</span>
        <span class="font-bold text-xl tracking-tight" style="font-family:Georgia,serif">TaskFlow</span>
      </div>
      <!-- ✅ FASE 9: botón modo oscuro -->
      <button id="darkToggle" aria-label="Activar modo oscuro"
              class="w-9 h-9 rounded-full border border-stone-200 dark:border-neutral-600
                     bg-transparent hover:bg-stone-100 dark:hover:bg-neutral-700
                     flex items-center justify-center text-base
                     transition-colors duration-150
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-green-700">
        <span id="darkIcon">☽</span>
      </button>
    </div>
  </header>
 
  <!-- MAIN -->
  <main class="px-6 lg:pl-8 lg:pr-4 py-8 max-w-3xl w-full">
 
    <!-- Formulario -->
    <section aria-labelledby="form-title">
      <h2 id="form-title"
          class="text-xs font-bold uppercase tracking-widest text-stone-400 dark:text-neutral-500 mb-3">
        Nueva tarea
      </h2>
      <form id="taskForm" novalidate class="flex gap-2">
        <label for="taskInput" class="sr-only">Escribe una tarea</label>
        <input type="text" id="taskInput"
               placeholder="¿Qué tienes que hacer?" autocomplete="off" maxlength="120"
               class="flex-1 h-11 px-4 text-base rounded-lg
                      border border-stone-200 dark:border-neutral-600
                      bg-white dark:bg-neutral-800
                      text-neutral-900 dark:text-stone-100
                      placeholder-stone-400 dark:placeholder-neutral-500
                      hover:border-stone-400
                      focus:outline-none focus:border-green-700 focus:ring-2 focus:ring-green-700/20
                      transition-all duration-150" />
        <button type="submit"
                class="h-11 px-5 rounded-lg font-semibold text-white whitespace-nowrap
                       bg-green-800 dark:bg-green-600
                       hover:opacity-85 active:scale-95
                       transition-all duration-150
                       focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-green-700">
          Añadir
        </button>
      </form>
    </section>
 
    <!-- Filtros + búsqueda -->
    <section aria-label="Filtros y búsqueda" class="flex flex-wrap items-center gap-3 mt-6">
      <div role="group" aria-label="Filtrar tareas"
           class="flex gap-1 bg-white dark:bg-neutral-800
                  border border-stone-200 dark:border-neutral-600 rounded-lg p-1">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="pending">Pendientes</button>
        <button class="filter-btn" data-filter="completed">Completadas</button>
      </div>
      <label for="searchInput" class="sr-only">Buscar tareas</label>
      <input type="search" id="searchInput" placeholder="Buscar..." aria-label="Buscar tareas"
             class="flex-1 min-w-[140px] h-10 px-3 text-sm rounded-lg
                    border border-stone-200 dark:border-neutral-600
                    bg-white dark:bg-neutral-800
                    text-neutral-900 dark:text-stone-100
                    placeholder-stone-400 dark:placeholder-neutral-500
                    focus:outline-none focus:border-green-700
                    transition-colors duration-150" />
      <label for="sortSelect" class="sr-only">Ordenar tareas</label>
      <select id="sortSelect" aria-label="Ordenar tareas"
              class="h-10 px-3 text-sm rounded-lg
                     border border-stone-200 dark:border-neutral-600
                     bg-white dark:bg-neutral-800
                     text-neutral-900 dark:text-stone-100
                     focus:outline-none focus:border-green-700
                     transition-colors duration-150">
        <option value="newest">Más nuevas</option>
        <option value="oldest">Más antiguas</option>
        <option value="completedLast">Completadas al final</option>
      </select>
    </section>
 
    <!-- Acciones globales -->
    <section aria-label="Acciones globales" class="flex gap-2 mt-2">
      <button id="markAllBtn"
              class="px-3 py-1.5 text-xs font-medium rounded
                     border border-stone-200 dark:border-neutral-600
                     text-stone-500 dark:text-neutral-400
                     hover:bg-stone-100 dark:hover:bg-neutral-700
                     hover:text-neutral-900 dark:hover:text-stone-100
                     transition-colors duration-150">
        Marcar todas
      </button>
      <button id="clearCompletedBtn"
              class="px-3 py-1.5 text-xs font-medium rounded
                     border border-stone-200 dark:border-neutral-600
                     text-stone-500 dark:text-neutral-400
                     hover:bg-red-500 hover:border-red-500 hover:text-white
                     transition-colors duration-150">
        Borrar completadas
      </button>
    </section>
 
    <!-- Lista de tareas -->
    <section aria-labelledby="tasks-title" class="mt-5">
      <h2 id="tasks-title" class="sr-only">Lista de tareas</h2>
      <ul id="taskList" aria-live="polite" aria-label="Lista de tareas" class="flex flex-col gap-2"></ul>
      <p id="emptyMsg" class="hidden mt-8 text-center text-sm text-stone-400 dark:text-neutral-500">
        No hay tareas. ¡Añade una arriba! 🎯
      </p>
    </section>
 
  </main>
 
  <!-- SIDEBAR ESTADÍSTICAS -->
  <aside aria-labelledby="stats-title" class="px-6 lg:pl-0 lg:pr-6 py-8">
    <h2 id="stats-title"
        class="text-xs font-bold uppercase tracking-widest text-stone-400 dark:text-neutral-500 mb-4">
      Estadísticas
    </h2>
    <div class="bg-white dark:bg-neutral-800 border border-stone-200 dark:border-neutral-700 rounded-xl p-4 mb-2 shadow-sm">
      <span id="statTotal" class="block text-3xl font-bold leading-none" style="font-family:Georgia,serif">0</span>
      <span class="block text-xs uppercase tracking-wide text-stone-400 dark:text-neutral-500 mt-1">Total</span>
    </div>
    <div class="bg-white dark:bg-neutral-800 border border-stone-200 dark:border-neutral-700 rounded-xl p-4 mb-2 shadow-sm">
      <span id="statPending" class="block text-3xl font-bold leading-none text-orange-400 dark:text-orange-300" style="font-family:Georgia,serif">0</span>
      <span class="block text-xs uppercase tracking-wide text-stone-400 dark:text-neutral-500 mt-1">Pendientes</span>
    </div>
    <div class="bg-white dark:bg-neutral-800 border border-stone-200 dark:border-neutral-700 rounded-xl p-4 mb-4 shadow-sm">
      <span id="statCompleted" class="block text-3xl font-bold leading-none text-emerald-600 dark:text-emerald-400" style="font-family:Georgia,serif">0</span>
      <span class="block text-xs uppercase tracking-wide text-stone-400 dark:text-neutral-500 mt-1">Completadas</span>
    </div>
    <div class="flex items-center gap-2" aria-label="Progreso">
      <div class="flex-1 h-1.5 bg-stone-200 dark:bg-neutral-700 rounded-full overflow-hidden">
        <div id="progressFill" class="h-full bg-emerald-500 dark:bg-emerald-400 rounded-full w-0 transition-all duration-500"></div>
      </div>
      <span id="progressLabel" class="text-xs font-semibold text-stone-400 dark:text-neutral-500 min-w-[28px]">0%</span>
    </div>
  </aside>
 
  <!-- FOOTER -->
  <footer class="lg:col-span-2 text-center py-4 text-xs text-stone-400 dark:text-neutral-600
                 border-t border-stone-200 dark:border-neutral-700">
    Juan Miguel Giner — 2026
  </footer>
 
  <!-- PLANTILLA DE TAREA (clonada por JS, invisible en el DOM) -->
  <template id="taskTemplate">
    <li class="task-card group flex items-center gap-3
               bg-white dark:bg-neutral-800
               border border-stone-200 dark:border-neutral-700
               rounded-xl px-4 py-3 shadow-sm
               hover:-translate-y-px hover:shadow-md
               transition-all duration-150 animate-slideIn">
 
      <button class="task-check flex-shrink-0 w-5 h-5 rounded-full border-2
                     border-stone-300 dark:border-neutral-500
                     flex items-center justify-center text-[10px] text-transparent
                     hover:border-green-700 transition-colors duration-150
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-green-700"
              aria-label="Marcar como completada"></button>
 
      <span class="task-title flex-1 text-[0.95rem] leading-snug break-words
                   text-neutral-900 dark:text-stone-100"></span>
 
      <button class="task-edit opacity-0 group-hover:opacity-100
                     px-1.5 py-1 rounded text-sm text-stone-400
                     hover:bg-green-50 dark:hover:bg-green-900/30
                     hover:text-green-800 dark:hover:text-green-400
                     focus-visible:opacity-100
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-green-700
                     transition-all duration-150"
              aria-label="Editar tarea">✎</button>
 
      <button class="task-delete opacity-0 group-hover:opacity-100
                     px-1.5 py-1 rounded text-sm text-stone-400
                     hover:bg-red-50 dark:hover:bg-red-900/30
                     hover:text-red-500
                     focus-visible:opacity-100
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-red-400
                     transition-all duration-150"
              aria-label="Eliminar tarea">✕</button>
    </li>
  </template>

  <!-- Modal confirmación de borrado -->
  <div id="deleteModal" class="hidden fixed inset-0 z-[60]" aria-hidden="true">
    <div id="deleteModalBackdrop" class="absolute inset-0 bg-black/40"></div>
    <div class="absolute inset-0 flex items-center justify-center p-6">
      <div role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle"
           class="w-full max-w-sm rounded-2xl
                  bg-white dark:bg-neutral-800
                  border border-stone-200 dark:border-neutral-700
                  shadow-xl p-5">
        <h3 id="deleteModalTitle" class="text-sm font-bold tracking-tight">Eliminar tarea</h3>
        <p class="mt-2 text-sm text-stone-500 dark:text-neutral-400">
          ¿Seguro que quieres eliminar <span id="deleteModalTaskTitle" class="font-semibold text-stone-700 dark:text-stone-200"></span>?
        </p>
        <div class="mt-4 flex justify-end gap-2">
          <button id="deleteModalCancel"
                  class="h-10 px-3 rounded-lg text-sm font-medium
                         border border-stone-200 dark:border-neutral-600
                         text-stone-600 dark:text-neutral-300
                         hover:bg-stone-100 dark:hover:bg-neutral-700
                         transition-colors duration-150">
            Cancelar
          </button>
          <button id="deleteModalConfirm"
                  class="h-10 px-3 rounded-lg text-sm font-semibold text-white
                         bg-red-600 hover:bg-red-700 active:scale-95
                         transition-all duration-150
                         focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-red-400">
            Eliminar
          </button>
        </div>
      </div>
    </div>
  </div>
 
  <script src="app.js"></script>
</body>
</html>
